<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1424"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#080E1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#35E3AD" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#35E3AD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16283F"/>
      <stop offset="1" stop-color="#0D1B2C"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3DEAB4"/>
      <stop offset="1" stop-color="#1FC79A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- faint peptide chain motif -->
  <g stroke="#35E3AD" stroke-opacity="0.10" stroke-width="2" fill="none">
    <path d="M -20 430 C 120 360, 220 470, 360 400 S 620 350, 760 420 S 1020 380, 1060 360"/>
  </g>
  <g fill="#35E3AD" fill-opacity="0.12">
    <circle cx="120" cy="372" r="6"/><circle cx="360" cy="400" r="6"/>
    <circle cx="540" cy="372" r="6"/><circle cx="760" cy="420" r="6"/>
    <circle cx="940" cy="372" r="6"/>
  </g>
  <g fill="#35E3AD" fill-opacity="0.06">
    <circle cx="880" cy="120" r="4"/><circle cx="950" cy="200" r="3"/>
    <circle cx="820" cy="80" r="3"/><circle cx="700" cy="60" r="3"/>
  </g>

  <!-- AP icon tile -->
  <g>
    <rect x="72" y="110" width="280" height="280" rx="64" fill="url(#iconbg)" stroke="#35E3AD" stroke-opacity="0.25" stroke-width="2"/>
    <text x="212" y="288" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="800" fill="url(#teal)" text-anchor="middle" letter-spacing="-6">AP</text>
    <line x1="138" y1="318" x2="286" y2="318" stroke="#35E3AD" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round"/>
    <circle cx="138" cy="190" r="4" fill="#35E3AD" fill-opacity="0.4"/>
    <circle cx="300" cy="340" r="4" fill="#35E3AD" fill-opacity="0.4"/>
  </g>

  <!-- text block -->
  <text x="406" y="158" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#3DEAB4" letter-spacing="4">PEPTIDE RESEARCH REFERENCE</text>

  <text x="404" y="238" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800" fill="#F1F5F9" letter-spacing="-1">American Peptide</text>

  <text x="406" y="300" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#AEBED1">Cited, chemistry-grade reference —</text>
  <text x="406" y="340" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#AEBED1">catalog, calculators &amp; COA decoder.</text>

  <!-- feature chips -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#3DEAB4">
    <text x="406" y="404">Works offline</text>
    <text x="592" y="404" fill="#5C6B80">•</text>
    <text x="618" y="404">No login</text>
    <text x="744" y="404" fill="#5C6B80">•</text>
    <text x="770" y="404">Research-grade</text>
  </g>
</svg>
